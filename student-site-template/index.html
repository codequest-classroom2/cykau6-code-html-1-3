<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coding Quest</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="student-name">Loading...</h1>
            <div class="stats">
                <div class="stat">⭐ XP: <span id="xp">0</span></div>
                <div class="stat">🏆 Badges: <span id="badges">0</span></div>
            </div>
        </header>

        <div id="skill-tree" class="skill-tree">
            <!-- Circle tree will be built here -->
        </div>

        <div style="text-align:center; margin: 16px 0;">
            <button onclick="loadStudentProgress()" style="font-size:1rem; padding:10px 24px; border-radius:20px; background:#4CAF50; color:white; border:none; cursor:pointer;">🔄 Refresh Progress</button>
        </div>

        <footer>
            <p>🚀 Every circle you complete = new powers! 🌟</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
